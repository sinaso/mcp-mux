# App Configuration
# Single source of truth for branding and compile-time settings
#

[branding]
# User-facing display name
display_name = "McpMux"

# Reverse-domain app identifier (used for data directories, bundle ID)
identifier = "com.mcpmux.app"

# Custom URL scheme for deep links (mcpmux://...)
deep_link_scheme = "mcpmux"

# Primary domain
domain = "mcpmux.com"

# API subdomain
api_domain = "api.mcpmux.com"

# Keychain/credential manager service name
keychain_service = "com.mcpmux.app"

# Log file prefix
log_prefix = "mcpmux"

# MCP server config key (for clients like VS Code, Claude Desktop)
mcp_config_key = "mcpmux"

# GitHub organization
github_org = "mcpmux"

# NPM scope
npm_scope = "@mcpmux"

[branding.oauth]
# Branding URIs sent during Dynamic Client Registration (RFC 7591)
# OAuth servers display these on consent screens
logo_uri = "https://mcpmux.com/favicon.svg"
client_uri = "https://mcpmux.com"
tos_uri = "https://mcpmux.com/docs/"
policy_uri = "https://mcpmux.com/docs/"

[config]
# Registry API base URL (overridable via MCPMUX_REGISTRY_URL env var at runtime)
registry_url = "https://api.mcpmux.com"

# Show the Software Updates section in Settings (set to false to hide it entirely)
software_updates_enabled = false
